name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install extractor dependencies (cross-platform)
        run: pip install openpyxl python-docx

      - name: Seed synthetic database
        run: python3 seed_db.py --force

      - name: Run dashboard tests
        run: npm test

      - name: Run extraction engine tests
        run: python3 -m extractor.test_extractor

      - name: Run raw-to-database mapper tests
        run: python3 test_map_raw_to_db.py
