name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install extractor + report-render dependencies
        run: pip install openpyxl python-docx reportlab pyxlsb xlrd arabic-reshaper python-bidi

      - name: Seed synthetic database
        run: python3 seed_db.py --force

      - name: Check project structure (root stays clean)
        run: python3 test_project_structure.py

      - name: Run dashboard tests
        run: npm test

      - name: Run extraction engine tests
        run: python3 -m extractor.test_extractor

      - name: Run Excel COM helper/extractor tests (mocked, no Windows)
        run: python3 -m extractor.test_excel_com

      - name: Run Arabic normalization tests
        run: python3 -m extractor.test_arabic

      - name: Run database schema compatibility tests
        run: python3 test_db_schema.py

      - name: Run MCP server tests (tools + JSON-RPC dispatch)
        run: python3 -m mcp_server.test_mcp

      - name: Run raw-to-database mapper tests
        run: python3 test_map_raw_to_db.py

      - name: Run reports engine tests
        run: python3 -m reports.test_reports

      - name: Run report render tests (Excel/PDF)
        run: python3 -m reports.test_render

      - name: Run what-if scenario tests
        run: python3 -m reports.test_scenario

      - name: Run knowledge base tests
        run: python3 -m brain.test_brain

      - name: Validate knowledge base links
        run: python3 -m brain.cli --check

      - name: Run mapping review tool tests
        run: python3 test_mapping_tool.py
